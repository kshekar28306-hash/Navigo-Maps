name: navigo
description: A voice-enabled mapping and routing application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: 11.1.0
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # ➔ The package that generates your custom logo
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # ➔ This tells the app your assets folder exists
  assets:
    - assets/

# ➔ The configuration block for your new logo
flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21